name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate worker assets
        run: npm run generate:worker-assets

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit + Integration tests
        run: npm test

      - name: Coverage report
        run: npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

      - name: Coverage gate (lines >= 75%)
        if: always()
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "No coverage report found, skipping gate"
            exit 0
          fi
          LINES=$(node -e "
            const s = require('./coverage/coverage-summary.json');
            console.log(s.total.lines.pct);
          ")
          echo "Line coverage: ${LINES}%"
          if (( $(echo "$LINES < 75" | bc -l) )); then
            echo "::error::Coverage ${LINES}% < 75% threshold"
            exit 1
          fi
          echo "Coverage gate passed: ${LINES}%"

  verify-bindings:
    name: Schema Drift Gate (D1 remote)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Layer A — Schema drift + migration gap check
        run: npm run verify:bindings
        # exit 2 (WARN) is non-blocking; exit 1 (FAIL) blocks merge
        continue-on-error: false

      - name: Layer B — Operational seed health check
        run: npm run verify:seed
        # Non-blocking: seed gaps should not block CI but must be visible
        continue-on-error: true
